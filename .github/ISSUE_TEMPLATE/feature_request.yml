name: Feature request
description: Suggest an improvement or new capability for the bot.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: >-
        Thanks for the idea. Keep it consistent with how the bot already works —
        see the constraints note at the bottom before filing.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what makes it hard or impossible today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should the bot do? Sketch the command / UX if you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one.
    validations:
      required: false

  - type: markdown
    attributes:
      value: >-
        **Constraints this must respect:** the bot stays **subscription-only**
        (no `ANTHROPIC_API_KEY`, no per-token billing) and within the **DM-first**
        and **per-session isolation** model (`setting_sources=[]`, owner +
        allowlist access, dangerous tools gated behind an Allow tap). Requests
        that break these aren't a fit.
